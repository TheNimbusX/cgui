# One request with every document the customer can see: proposals, invoices,
# orders, shipments and UPDs.
#
# This fragment is the customer-visible subset of the backend `Request` type
# (full type in schema/ent.graphql). Compose it into the cabinet query:
#
#   query CustomerCabinet {
#     customer { ...CustomerAggregate }
#     requests { ...RequestAggregate }
#   }
#
# Three things below are NEW backend work — they do not exist in
# schema/ent.graphql yet. See the specification, section "The data".
#   - customerStatus   (new field on Request)
#   - isCancelled      (new field on Request)
#   - proposals        (new edge on Request -> new Proposal type)

fragment RequestAggregate on Request {
  id
  created
  changed
  contractNumber
  contractDate
  contractSpecNumber
  contractSpecDate
  customerDesiredPrice
  customerStatus            # NEW backend field
  isCancelled               # NEW backend field

  manager {
    id
    name
    email
    avatar
  }

  company {
    id
    name
    phone
  }

  customerAccount {
    id
    okpo
    buyer
    inn
    kpp
    ogrn
    rs
    ks
    bik
    bank
    formalAddress
    postalAddress
    shippingAddress
    actualAddress
    invoicePrepaidRequired
    noContractRequired
    phone
    customerName
    customerPosition
  }

  productsRequested {
    id
    qty
    qtyUnits
    sku
    model
    brandterm { name }
    categoryterm { name }
  }

  products {
    id
    changed
    qty
    qtyUnits
    sku
    model
    shippingTime
    shippingMin
    shippingMax
    weight
    status
    disabled
    brandterm { name }
    categoryterm { name }
  }

  proposals {               # NEW backend edge -> new Proposal type
    id
    created
    changed
    title
    actuality
    shippingTime
    prepaid
    companyDetails
    proposalProducts {
      id
      lineNum
      title
      qty
      currency
      vat
      unit
      unitNoVat
      line
      lineNoVat
    }
  }

  invoices {
    id
    created
    changed
    invoiceNumber
    title
    actuality
    shippingTime
    prepaid
    canceled
    firstPaymentCreated
    paid
    paidInput
    companyDetails
    invoiceProducts {
      id
      created
      active
      lineNum
      title
      qty
      currency
      vat
      unit
      unitNoVat
      line
      lineNoVat
    }
    invoicePayments {
      id
      created
      changed
      paidInput
      paidPercent
      paymentDate
      transferDate
      transferNumber
    }
  }

  orders {
    id
    created
    changed
    postDate
    received
    status
    products {
      id
      shippingMin
      shippingMax
    }
    shippings {
      id
      created
      changed
      received
      sentToClient
      productsIds
      shippingProducts {
        id
        productID
      }
      shippingGroup {
        id
        created
        postDate
        documentsDate
        gtd
      }
    }
  }

  upds {
    id
    created
    changed
    number
    date
    updProducts {
      productID
    }
    updRequests {
      requestID
    }
  }
}
